<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trainee CMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;text-transform:uppercase;}
body{font-family:Inter,sans-serif;background:#eef2ff;padding:12px;}
input,button{text-transform:uppercase;}
::-webkit-scrollbar{height:6px;width:6px;}
::-webkit-scrollbar-thumb{background:#a5b4fc;border-radius:4px;}
.spin{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxFd7Sj_iZYFeYaIy28IifkES3evUvAO9EzTXDi6w5Kgrjjcj0ABSanFp4cUpTc9ukyZQ/exec";

const COLS=[
  {key:"bunkName",label:"Bunk Name"},
  {key:"traineeName",label:"Trainee Name"},
  {key:"policyCount",label:"Policy Count",type:"number"},
  {key:"serviceCharge",label:"Service Charge",type:"number"},
  {key:"cms",label:"CMS",type:"number"},
  {key:"gpaAmount",label:"GPA Amount",type:"number"},
  {key:"pendingAmount",label:"Pending Amount",type:"number"},
  {key:"cash",label:"Cash",type:"number"},
  {key:"gPay",label:"G Pay",type:"number"},
  {key:"expense",label:"Expense",type:"number"},
  {key:"incentive",label:"Incentive",type:"number"},
  {key:"fromDate",label:"From Date",type:"date"},
  {key:"toDate",label:"To Date",type:"date"},
  {key:"receivedByCash",label:"Received By Cash"},
  {key:"receivedByGPay",label:"Received By G Pay"},
];

const STORAGE_KEY="trainee_cms_v2";
const EMPTY=()=>Object.fromEntries(COLS.map(c=>[c.key,""]));
const mkInv=(name,id)=>({id,name,records:[],closedAt:null});

const loadState=()=>{try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}};
const saveState=(invs,activeId)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify({invs,activeId}));}catch{}};

// Send via GET with encoded payload
const scriptCall=async(payload)=>{
  const url=SCRIPT_URL+"?payload="+encodeURIComponent(JSON.stringify(payload));
  const res=await fetch(url);
  if(!res.ok)throw new Error("HTTP "+res.status);
  return res.json();
};

function App(){
  const stored=loadState();
  const [invs,setInvs]=useState(stored?.invs||[mkInv("CMS 1",1)]);
  const [activeId,setActiveId]=useState(stored?.activeId||1);
  const [search,setSearch]=useState("");
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY);
  const [showForm,setShowForm]=useState(false);
  const [delId,setDelId]=useState(null);
  const [toast,setToast]=useState(null);
  const [showClose,setShowClose]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [newName,setNewName]=useState("");
  const [view,setView]=useState("active");
  const [histId,setHistId]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [status,setStatus]=useState(null);
  const tRef=useRef();

  useEffect(()=>{saveState(invs,activeId);},[invs,activeId]);
  useEffect(()=>()=>clearTimeout(tRef.current),[]);

  const showToast=(msg,type="success")=>{
    setToast({msg,type});clearTimeout(tRef.current);
    tRef.current=setTimeout(()=>setToast(null),2800);
  };

  const active=invs.find(i=>i.id===activeId);
  const closed=invs.filter(i=>i.closedAt!==null);
  const histInv=invs.find(i=>i.id===histId);
  const isHist=view==="history";
  const records=active?.records||[];
  const filtered=records.filter(r=>COLS.some(c=>String(r[c.key]||"").toLowerCase().includes(search.toLowerCase())));
  const display=isHist&&histInv?histInv.records:filtered;
  const currentInv=isHist?histInv:active;

  const totals=(recs)=>{const t={};COLS.filter(c=>c.type==="number").forEach(c=>{t[c.key]=recs.reduce((s,r)=>s+(parseFloat(r[c.key])||0),0);});return t;};
  const dt=totals(display);

  const upd=(fn)=>setInvs(p=>p.map(i=>i.id===activeId?{...i,records:fn(i.records)}:i));
  const updFor=(id,fn)=>setInvs(p=>p.map(i=>i.id===id?{...i,records:fn(i.records)}:i));

  const save=()=>{
    if(!form.bunkName||!form.traineeName){showToast("Bunk Name & Trainee Name required","error");return;}
    if(editId!==null){upd(r=>r.map(x=>x.id===editId?{...form,id:editId}:x));showToast("Updated!");}
    else{upd(r=>[...r,{...form,id:Date.now()}]);showToast("Added!");}
    setShowForm(false);setEditId(null);
  };

  // Push current CMS records to its own sheet tab
  const push=async()=>{
    const recs=display;
    if(!recs.length){setStatus({msg:"No records to push",ok:false});return;}
    if(!currentInv){setStatus({msg:"No active CMS",ok:false});return;}
    setSyncing(true);setStatus(null);
    try{
      const header=COLS.map(c=>c.label.toUpperCase());
      const rows=recs.map(r=>COLS.map(c=>String(r[c.key]||"")));
      const json=await scriptCall({action:"push",sheetName:currentInv.name,rows:[header,...rows]});
      if(json.ok){setStatus({msg:`✓ ${recs.length} records pushed to sheet "${currentInv.name}"!`,ok:true});showToast("Pushed to Sheets!");}
      else{setStatus({msg:"Error: "+(json.error||"Unknown"),ok:false});}
    }catch(e){setStatus({msg:"Push failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  // Push ALL CMS (active + closed) each to their own sheet tab
  const pushAll=async()=>{
    setSyncing(true);setStatus(null);
    try{
      let count=0;
      for(const inv of invs){
        if(!inv.records.length)continue;
        const header=COLS.map(c=>c.label.toUpperCase());
        const rows=inv.records.map(r=>COLS.map(c=>String(r[c.key]||"")));
        await scriptCall({action:"push",sheetName:inv.name,rows:[header,...rows]});
        count++;
      }
      setStatus({msg:`✓ All ${count} CMS pushed to Google Sheets!`,ok:true});
      showToast("All CMS pushed!");
    }catch(e){setStatus({msg:"Push all failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  // Pull from sheet tab matching current CMS name
  const pull=async()=>{
    if(!currentInv){setStatus({msg:"No active CMS to pull into",ok:false});return;}
    setSyncing(true);setStatus(null);
    try{
      const json=await scriptCall({action:"get",sheetName:currentInv.name});
      if(!json.ok)throw new Error(json.error||"Unknown error");
      const rows=json.rows||[];
      if(rows.length<2){setStatus({msg:`No data in sheet "${currentInv.name}"`,ok:false});setSyncing(false);return;}
      const header=rows[0].map(h=>String(h).toLowerCase().replace(/\s+/g,""));
      const colMap=COLS.map(c=>header.findIndex(h=>h===c.key.toLowerCase()||h===c.label.toLowerCase().replace(/\s+/g,"")));
      const imported=rows.slice(1).map((row,i)=>{
        const rec={id:Date.now()+i};
        COLS.forEach((c,ci)=>{rec[c.key]=colMap[ci]>=0?String(row[colMap[ci]]||""):"";});
        return rec;
      }).filter(r=>r.bunkName||r.traineeName);
      // Pull into whichever CMS is currently viewed (active or history)
      setInvs(p=>p.map(i=>i.id===currentInv.id?{...i,records:imported}:i));
      setStatus({msg:`✓ ${imported.length} records pulled from sheet "${currentInv.name}"!`,ok:true});
      showToast("Pulled from Sheets!");
    }catch(e){setStatus({msg:"Pull failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  // Pull ALL sheets and match/create CMS entries
  const pullAll=async()=>{
    setSyncing(true);setStatus(null);
    try{
      const json=await scriptCall({action:"getAll"});
      if(!json.ok)throw new Error(json.error||"Unknown error");
      const sheetsData=json.sheets||{};
      let totalImported=0;
      setInvs(prev=>{
        let updated=[...prev];
        for(const [sheetName,rows] of Object.entries(sheetsData)){
          if(!rows||rows.length<2)continue;
          const header=rows[0].map(h=>String(h).toLowerCase().replace(/\s+/g,""));
          const colMap=COLS.map(c=>header.findIndex(h=>h===c.key.toLowerCase()||h===c.label.toLowerCase().replace(/\s+/g,"")));
          const imported=rows.slice(1).map((row,i)=>{
            const rec={id:Date.now()+i+Math.random()};
            COLS.forEach((c,ci)=>{rec[c.key]=colMap[ci]>=0?String(row[colMap[ci]]||""):"";});
            return rec;
          }).filter(r=>r.bunkName||r.traineeName);
          totalImported+=imported.length;
          const existing=updated.find(i=>i.name.toUpperCase()===sheetName.toUpperCase());
          if(existing){
            updated=updated.map(i=>i.name.toUpperCase()===sheetName.toUpperCase()?{...i,records:imported}:i);
          } else {
            const newId=Date.now()+Math.random();
            updated=[...updated,{id:newId,name:sheetName,records:imported,closedAt:null}];
          }
        }
        return updated;
      });
      setStatus({msg:`✓ Pulled all sheets: ${totalImported} total records!`,ok:true});
      showToast("All sheets pulled!");
    }catch(e){setStatus({msg:"Pull all failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  const saveSync=async()=>{
    if(!form.bunkName||!form.traineeName){showToast("Bunk Name & Trainee Name required","error");return;}
    const rec={...form,id:editId!==null?editId:Date.now()};
    if(editId!==null){upd(r=>r.map(x=>x.id===editId?rec:x));showToast("Updated!");}
    else{
      upd(r=>[...r,rec]);
      try{
        const header=COLS.map(c=>c.label.toUpperCase());
        const row=COLS.map(c=>String(rec[c.key]||""));
        await scriptCall({action:"append",sheetName:active?.name||"Sheet1",header,rows:[row]});
        showToast("Added + Synced!");
      }catch{showToast("Added (sync failed)","error");}
    }
    setShowForm(false);setEditId(null);
  };

  const closeInv=()=>{
    setInvs(p=>p.map(i=>i.id===activeId?{...i,closedAt:new Date().toLocaleString()}:i));
    // Switch to first open CMS if exists, else stay on history
    const remaining=invs.filter(i=>i.id!==activeId&&!i.closedAt);
    if(remaining.length){setActiveId(remaining[0].id);setView("active");}
    else{setView("history");setHistId(activeId);}
    setShowClose(false);showToast("CMS Closed!");
  };

  const newInv=()=>{
    const n=newName.trim()||`CMS ${invs.length+1}`;
    const id=Date.now();
    setInvs(p=>[...p,mkInv(n,id)]);
    setActiveId(id);setNewName("");setShowNew(false);setView("active");setSearch("");showToast(`"${n}" Started!`);
  };

  const download=(recs,name)=>{
    if(!recs||!recs.length){showToast("No records to download","error");return;}
    const esc=v=>String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const hRow=COLS.map(c=>`<Cell ss:StyleID="h"><Data ss:Type="String">${esc(c.label.toUpperCase())}</Data></Cell>`).join("");
    const dRows=recs.map(r=>"<Row>"+COLS.map(c=>{const v=r[c.key]||"";const t=c.type==="number"&&v!==""?"Number":"String";return`<Cell><Data ss:Type="${t}">${esc(t==="Number"?parseFloat(v)||0:v)}</Data></Cell>`;}).join("")+"</Row>").join("");
    const xml=`<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="h"><Font ss:Bold="1"/><Interior ss:Color="#C7D2FE" ss:Pattern="Solid"/></Style></Styles><Worksheet ss:Name="CMS"><Table><Row>${hRow}</Row>${dRows}</Table></Worksheet></Workbook>`;
    const a=document.createElement("a");
    a.href="data:application/vnd.ms-excel;charset=utf-8,"+encodeURIComponent(xml);
    a.download=`${name||"cms"}.xls`;a.click();showToast("Downloaded!");
  };

  const btn=(bg,color,outline)=>({padding:"8px 14px",borderRadius:8,border:`2px solid ${outline?"#6b7280":bg}`,background:outline?"transparent":bg,color:outline?"#6b7280":color,fontWeight:700,fontSize:12,cursor:"pointer"});
  const TH={padding:"9px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:"#4338ca",whiteSpace:"nowrap",borderBottom:"2px solid #a5b4fc",borderRight:"1px solid #c7d2fe",background:"#eef2ff"};
  const TD={padding:"8px 10px",fontSize:12,whiteSpace:"nowrap",borderBottom:"1px solid #e0e7ff",borderRight:"1px solid #e0e7ff"};
  const OV={position:"fixed",inset:0,background:"rgba(30,27,75,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16};

  return(
    <div style={{minHeight:"100vh"}}>
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.type==="error"?"#ef4444":"#22c55e",color:"#fff",padding:"10px 18px",borderRadius:8,border:"2px solid rgba(255,255,255,0.4)",fontWeight:700,fontSize:13}}>{toast.msg}</div>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#3b82f6,#6366f1)",borderRadius:14,border:"2px solid #818cf8",padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{color:"#fff",fontSize:18,fontWeight:800}}>📋 TRAINEE CMS</div>
            <div style={{color:"#bfdbfe",fontSize:11,marginTop:2}}>
              {isHist?`VIEWING: ${histInv?.name}`:`ACTIVE: ${active?.name}`} • {(isHist?histInv?.records?.length:records.length)||0} RECORDS
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {!isHist&&<button onClick={()=>{setForm(EMPTY());setEditId(null);setShowForm(true);}} style={btn("#3b82f6","#fff")}>+ ADD</button>}
            <button onClick={()=>download(display,currentInv?.name)} style={btn("#10b981","#fff")}>⬇ DOWNLOAD</button>
            {!isHist&&<button onClick={()=>setShowClose(true)} style={btn("#f59e0b","#fff")}>🔒 CLOSE</button>}
            <button onClick={()=>setShowNew(true)} style={btn("#8b5cf6","#fff")}>✨ NEW CMS</button>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {invs.filter(i=>!i.closedAt).map(i=>(
            <button key={i.id} onClick={()=>{setActiveId(i.id);setView("active");setSearch("");setStatus(null);}}
              style={{padding:"4px 12px",borderRadius:20,border:"2px solid #fff",fontSize:11,fontWeight:700,cursor:"pointer",
                background:view==="active"&&activeId===i.id?"#fff":"transparent",
                color:view==="active"&&activeId===i.id?"#3b82f6":"#fff"}}>
              📂 {i.name}
            </button>
          ))}
          {closed.map(i=>(
            <button key={i.id} onClick={()=>{setView("history");setHistId(i.id);setStatus(null);}}
              style={{padding:"4px 12px",borderRadius:20,border:"2px solid #fbbf24",fontSize:11,fontWeight:700,cursor:"pointer",
                background:view==="history"&&histId===i.id?"#fbbf24":"transparent",
                color:view==="history"&&histId===i.id?"#1e293b":"#fde68a"}}>
              🔒 {i.name}
            </button>
          ))}
        </div>
      </div>

      {isHist&&histInv&&<div style={{background:"#fef3c7",border:"2px solid #f59e0b",borderRadius:10,padding:"9px 14px",marginBottom:12,fontSize:12,color:"#92400e",fontWeight:700}}>🔒 CLOSED: {histInv.name} | {histInv.closedAt}</div>}
      {!isHist&&<div style={{marginBottom:12,border:"2px solid #a5b4fc",borderRadius:10,background:"#fff",overflow:"hidden"}}>
        <input placeholder="🔍 SEARCH..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",padding:"10px 14px",border:"none",fontSize:13,outline:"none",background:"transparent"}}/>
      </div>}

      {/* SUMMARY CARDS */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
        {[
          {label:"TOTAL G PAY",key:"gPay",color:"#6366f1",bg:"#ede9fe"},
          {label:"TOTAL CASH",key:"cash",color:"#10b981",bg:"#d1fae5"},
          {label:"TOTAL PENDING",key:"pendingAmount",color:"#f59e0b",bg:"#fef3c7"},
          {label:"G PAY + CASH",key:"_sum",color:"#0ea5e9",bg:"#e0f2fe"},
        ].map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:10,padding:"10px 16px",flex:"1 1 120px",border:`2px solid ${s.color}`}}>
            <div style={{fontSize:10,color:s.color,fontWeight:700}}>{s.label}</div>
            <div style={{fontSize:18,fontWeight:800,color:s.color}}>₹{(s.key==="_sum"?(dt.gPay||0)+(dt.cash||0):(dt[s.key]||0)).toLocaleString()}</div>
          </div>
        ))}
        {/* Google Sheets Card */}
        <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",flex:"1 1 200px",border:"2px solid #22c55e"}}>
          <div style={{fontSize:10,color:"#15803d",fontWeight:700,marginBottom:4}}>
            🟢 GOOGLE SHEETS — <span style={{color:"#0ea5e9"}}>{currentInv?.name||"—"}</span>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            <button onClick={push} disabled={syncing} title={`Push "${currentInv?.name}" to its sheet tab`}
              style={{...btn("#10b981","#fff"),fontSize:10,padding:"5px 8px",flex:"1 1 60px"}}>
              {syncing?<span className="spin">⟳</span>:"↑ PUSH"}
            </button>
            <button onClick={pull} disabled={syncing} title={`Pull "${currentInv?.name}" from its sheet tab`}
              style={{...btn("#3b82f6","#fff"),fontSize:10,padding:"5px 8px",flex:"1 1 60px"}}>
              {syncing?<span className="spin">⟳</span>:"↓ PULL"}
            </button>
            <button onClick={pushAll} disabled={syncing} title="Push ALL CMS to their own sheet tabs"
              style={{...btn("#8b5cf6","#fff"),fontSize:10,padding:"5px 8px",flex:"1 1 80px"}}>
              {syncing?<span className="spin">⟳</span>:"↑↑ ALL"}
            </button>
            <button onClick={pullAll} disabled={syncing} title="Pull ALL sheet tabs into CMS"
              style={{...btn("#f59e0b","#fff"),fontSize:10,padding:"5px 8px",flex:"1 1 80px"}}>
              {syncing?<span className="spin">⟳</span>:"↓↓ ALL"}
            </button>
          </div>
        </div>
      </div>

      {status&&<div style={{marginBottom:12,padding:"9px 14px",borderRadius:10,fontSize:12,fontWeight:700,
        background:status.ok?"#dcfce7":"#fee2e2",border:`2px solid ${status.ok?"#22c55e":"#ef4444"}`,
        color:status.ok?"#15803d":"#dc2626"}}>{status.msg}</div>}

      {/* TABLE */}
      <div style={{background:"#fff",borderRadius:12,border:"2px solid #a5b4fc",overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:1200}}>
          <thead><tr>
            <th style={TH}>S NO</th>
            {COLS.map(c=><th key={c.key} style={TH}>{c.label}</th>)}
            {!isHist&&<th style={TH}>ACTIONS</th>}
          </tr></thead>
          <tbody>
            {display.length===0?(
              <tr><td colSpan={COLS.length+2} style={{textAlign:"center",padding:36,color:"#9ca3af"}}>NO RECORDS. ADD ONE!</td></tr>
            ):display.map((r,i)=>(
              <tr key={r.id} style={{background:i%2===0?"#fff":"#f5f7ff"}}>
                <td style={{...TD,fontWeight:700,color:"#6366f1"}}>{i+1}</td>
                {COLS.map(c=>(
                  <td key={c.key} style={{...TD,fontWeight:c.type==="number"?600:400,color:c.type==="number"?"#1d4ed8":"#374151"}}>
                    {c.type==="number"&&r[c.key]&&!isNaN(parseFloat(r[c.key]))?`₹${parseFloat(r[c.key]).toLocaleString()}`:(r[c.key]||"—")}
                  </td>
                ))}
                {!isHist&&<td style={{...TD,whiteSpace:"nowrap"}}>
                  <button onClick={()=>{setForm({...r});setEditId(r.id);setShowForm(true);}} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #3b82f6",background:"#dbeafe",color:"#1d4ed8",cursor:"pointer",fontSize:11,fontWeight:700}}>✏ EDIT</button>
                  <button onClick={()=>setDelId(r.id)} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #ef4444",background:"#fee2e2",color:"#dc2626",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:6}}>🗑</button>
                </td>}
              </tr>
            ))}
            {display.length>0&&(
              <tr style={{background:"#ede9fe",fontWeight:700,borderTop:"2px solid #818cf8"}}>
                <td style={TD} colSpan={3}>TOTAL ({display.length})</td>
                {COLS.slice(2).map(c=><td key={c.key} style={{...TD,color:"#5b21b6"}}>{c.type==="number"?`₹${(dt[c.key]||0).toLocaleString()}`:""}</td>)}
                {!isHist&&<td style={TD}/>}
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {/* ADD/EDIT MODAL */}
      {showForm&&(
        <div style={OV}>
          <div style={{background:"#fff",borderRadius:14,border:"2px solid #6366f1",padding:20,width:"95%",maxWidth:680,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,paddingBottom:12,borderBottom:"2px solid #e0e7ff"}}>
              <div style={{fontSize:16,fontWeight:800}}>{editId?"✏ EDIT RECORD":"➕ NEW RECORD"}</div>
              <button onClick={()=>{setShowForm(false);setEditId(null);}} style={{background:"none",border:"2px solid #e2e8f0",borderRadius:6,fontSize:16,cursor:"pointer",color:"#6b7280",width:32,height:32}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {COLS.map(c=>(
                <div key={c.key} style={{display:"flex",flexDirection:"column",gap:3,border:"1.5px solid #e0e7ff",borderRadius:8,padding:"8px 10px",background:"#f8faff"}}>
                  <label style={{fontSize:10,fontWeight:700,color:"#6366f1"}}>{c.label}</label>
                  <input type={c.type==="number"?"number":c.type==="date"?"date":"text"}
                    value={form[c.key]}
                    onChange={e=>setForm(f=>({...f,[c.key]:c.type==="number"||c.type==="date"?e.target.value:e.target.value.toUpperCase()}))}
                    style={{padding:"6px 8px",borderRadius:6,border:"1.5px solid #c7d2fe",fontSize:12,outline:"none",background:"#fff"}}
                    placeholder={c.label}/>
                </div>
              ))}
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16,paddingTop:12,borderTop:"2px solid #e0e7ff"}}>
              <button onClick={()=>{setShowForm(false);setEditId(null);}} style={btn("transparent","#6b7280",true)}>CANCEL</button>
              {!editId&&<button onClick={saveSync} style={btn("#22c55e","#fff")}>💾 SAVE + SYNC ↑</button>}
              <button onClick={save} style={btn("#3b82f6","#fff")}>💾 SAVE</button>
            </div>
          </div>
        </div>
      )}

      {/* CLOSE CONFIRM */}
      {showClose&&(
        <div style={OV}>
          <div style={{background:"#fff",borderRadius:14,border:"2px solid #f59e0b",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>🔒</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>CLOSE THIS CMS?</div>
            <div style={{color:"#6b7280",fontSize:12,marginBottom:16,border:"1.5px solid #fde68a",borderRadius:8,padding:10,background:"#fffbeb"}}>THIS CMS WILL BE LOCKED & SAVED IN HISTORY. YOU CAN STILL VIEW IT ANYTIME.</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>setShowClose(false)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
              <button onClick={closeInv} style={btn("#f59e0b","#fff")}>🔒 CLOSE & SAVE</button>
            </div>
          </div>
        </div>
      )}

      {/* NEW CMS MODAL */}
      {showNew&&(
        <div style={OV}>
          <div style={{background:"#fff",borderRadius:14,border:"2px solid #8b5cf6",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>✨</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:14}}>NEW CMS</div>
            <input value={newName} onChange={e=>setNewName(e.target.value.toUpperCase())} placeholder="NAME (E.G. MARCH 2026)"
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"2px solid #c4b5fd",fontSize:13,boxSizing:"border-box",outline:"none",marginBottom:16}}/>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>setShowNew(false)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
              <button onClick={newInv} style={btn("#8b5cf6","#fff")}>✨ START FRESH</button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE CONFIRM */}
      {delId&&(
        <div style={OV}>
          <div style={{background:"#fff",borderRadius:14,border:"2px solid #ef4444",padding:24,maxWidth:320,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
            <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>DELETE RECORD?</div>
            <div style={{color:"#6b7280",marginBottom:16,fontSize:12,padding:8,border:"1.5px solid #fee2e2",borderRadius:8,background:"#fff5f5"}}>THIS CANNOT BE UNDONE.</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button onClick={()=>setDelId(null)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
              <button onClick={()=>{upd(r=>r.filter(x=>x.id!==delId));setDelId(null);showToast("Deleted!","error");}} style={btn("#ef4444","#fff")}>DELETE</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
