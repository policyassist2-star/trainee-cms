<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trainee CMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;text-transform:uppercase;}
body{font-family:Inter,sans-serif;background:#eef2ff;padding:12px;}
input,button,select{text-transform:uppercase;}
::-webkit-scrollbar{height:6px;width:6px;}
::-webkit-scrollbar-thumb{background:#a5b4fc;border-radius:4px;}
.spin{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .18s ease}
.inline-input{width:100%;padding:3px 5px;border:1.5px solid #6366f1;border-radius:4px;font-size:11px;outline:none;background:#fff;font-family:Inter,sans-serif;text-transform:uppercase;}
.drop-zone{border:2.5px dashed #a5b4fc;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#f8f9ff;}
.drop-zone:hover,.drop-zone.drag-over{border-color:#6366f1;background:#ede9fe;}
.drop-zone input[type=file]{display:none;}
/* Bunk dropdown styles */
.bunk-dropdown-wrap{position:relative;width:100%;}
.bunk-dropdown-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:2px solid #6366f1;border-radius:8px;z-index:9999;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(99,102,241,0.18);}
.bunk-dropdown-list .bunk-opt{padding:7px 12px;cursor:pointer;font-size:12px;color:#374151;border-bottom:1px solid #e0e7ff;transition:background .1s;}
.bunk-dropdown-list .bunk-opt:hover,.bunk-dropdown-list .bunk-opt.selected{background:#eef2ff;color:#3730a3;font-weight:700;}
.bunk-dropdown-list .bunk-opt:last-child{border-bottom:none;}
.bunk-search-input{width:100%;padding:7px 10px;border:none;border-bottom:2px solid #e0e7ff;font-size:12px;outline:none;background:#f8f9ff;font-family:Inter,sans-serif;text-transform:uppercase;position:sticky;top:0;z-index:1;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useCallback}=React;

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyLkU-oaFpujlL9WyMosChY8AWfv58yrkjo2FYo9VSLUbXvwiNTRFxr3eFe0cB1dnfEPw/exec";
const SERVICE_CHARGE_RATE=165;

// ── 50 Default Bunk Names ─────────────────────────────────────
const DEFAULT_BUNK_NAMES=[
  "BUNK 01","BUNK 02","BUNK 03","BUNK 04","BUNK 05",
  "BUNK 06","BUNK 07","BUNK 08","BUNK 09","BUNK 10",
  "BUNK 11","BUNK 12","BUNK 13","BUNK 14","BUNK 15",
  "BUNK 16","BUNK 17","BUNK 18","BUNK 19","BUNK 20",
  "BUNK 21","BUNK 22","BUNK 23","BUNK 24","BUNK 25",
  "BUNK 26","BUNK 27","BUNK 28","BUNK 29","BUNK 30",
  "BUNK 31","BUNK 32","BUNK 33","BUNK 34","BUNK 35",
  "BUNK 36","BUNK 37","BUNK 38","BUNK 39","BUNK 40",
  "BUNK 41","BUNK 42","BUNK 43","BUNK 44","BUNK 45",
  "BUNK 46","BUNK 47","BUNK 48","BUNK 49","BUNK 50",
];
let BUNK_NAMES=[...DEFAULT_BUNK_NAMES];

const COLS=[
  {key:"bunkName",label:"Bunk Name"},
  {key:"traineeName",label:"Trainee Name"},
  {key:"policyCount",label:"Policy Count",type:"number"},
  {key:"serviceCharge",label:"Service Charge",type:"number"},
  {key:"cms",label:"CMS",type:"number"},
  {key:"gpaAmount",label:"GPA Amount",type:"number"},
  {key:"pendingAmount",label:"Pending Amount",type:"number"},
  {key:"cash",label:"Cash",type:"number"},
  {key:"gPay",label:"G Pay",type:"number"},
  {key:"expense",label:"Expense",type:"number"},
  {key:"incentive",label:"Incentive",type:"number"},
  {key:"officePaid",label:"Office Paid",type:"number"},
  {key:"fromDate",label:"From Date",type:"date"},
  {key:"toDate",label:"To Date",type:"date"},
  {key:"receivedByCash",label:"Received By Cash"},
  {key:"receivedByGPay",label:"Received By G Pay"},
  {key:"remark",label:"Remark"},
];
const NUM_COLS=COLS.filter(c=>c.type==="number").map(c=>c.key);
const STORAGE_KEY="trainee_cms_v4";
const EMPTY=()=>Object.fromEntries(COLS.map(c=>[c.key,""]));
const mkInv=(name,id)=>({id,name,records:[],closedAt:null,createdAt:new Date().toLocaleString()});
const loadState=()=>{try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}};
const saveState=(invs,activeId)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify({invs,activeId}));}catch{}};
let _uid=Date.now();
const uid=()=>String(++_uid);

const normalizeDate=v=>{
  if(!v)return"";
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}-\d{2}-\d{2}T/.test(s))return s.slice(0,10);
  const dmy=/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/.exec(s);
  if(dmy)return`${dmy[3]}-${dmy[2].padStart(2,"0")}-${dmy[1].padStart(2,"0")}`;
  if(/^\d+(\.\d+)?$/.test(s)){
    const serial=Math.floor(parseFloat(s));
    const d=new Date(Date.UTC(1899,11,30)+serial*86400000);
    return`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;
  }
  const dt=new Date(s);
  if(!isNaN(dt))return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
  return s;
};

const scriptCall=async(payload)=>{
  const url=SCRIPT_URL+"?payload="+encodeURIComponent(JSON.stringify(payload));
  const res=await fetch(url,{redirect:"follow"});
  if(!res.ok)throw new Error("HTTP "+res.status);
  const text=await res.text();
  try{return JSON.parse(text);}catch(e){throw new Error("Bad response: "+text.slice(0,120));}
};

const saveBunkNamesToSheet=async(names)=>{
  try{await scriptCall({action:"saveBunkNames",names});return true;}catch(e){return false;}
};
const loadBunkNamesFromSheet=async()=>{
  try{
    const json=await scriptCall({action:"getBunkNames"});
    if(json.ok&&json.names&&json.names.length>0){
      BUNK_NAMES.splice(0,BUNK_NAMES.length,...json.names);
      return json.names;
    }
  }catch(e){}
  return null;
};

const toCSV=(recs)=>{
  const esc=v=>'"'+String(v||"").replace(/"/g,'""')+'"';
  return [COLS.map(c=>esc(c.label)).join(","),...recs.map(r=>COLS.map(c=>esc(r[c.key]||"")).join(","))].join("\n");
};

const parseUploadedFile=(file)=>new Promise((resolve,reject)=>{
  const reader=new FileReader();
  const ext=file.name.split(".").pop().toLowerCase();
  reader.onload=e=>{
    try{
      let rows=[];
      if(ext==="csv"){
        const text=e.target.result;
        rows=text.trim().split(/\r?\n/).map(line=>{
          const cells=[];let cur="",inQ=false;
          for(let i=0;i<line.length;i++){
            const ch=line[i];
            if(ch==='"'){inQ=!inQ;}
            else if(ch===","&&!inQ){cells.push(cur.trim());cur="";}
            else cur+=ch;
          }
          cells.push(cur.trim());
          return cells;
        });
      } else {
        const wb=XLSX.read(e.target.result,{type:"binary",cellDates:true});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,dateNF:"YYYY-MM-DD"});
      }
      if(!rows.length){reject(new Error("Empty file"));return;}
      const header=rows[0].map(h=>String(h||"").toLowerCase().replace(/[\s_]/g,""));
      const colMap=COLS.map(c=>{
        const key=c.key.toLowerCase();
        const label=c.label.toLowerCase().replace(/\s/g,"");
        let idx=header.findIndex(h=>h===key||h===label);
        if(idx<0)idx=header.findIndex(h=>h.includes(key)||key.includes(h));
        return idx;
      });
      const imported=rows.slice(1).map(row=>{
        const rec={id:uid()};
        COLS.forEach((c,ci)=>{
          let v=colMap[ci]>=0?String(row[colMap[ci]]||""):"";
          if(c.type==="date"&&v)v=normalizeDate(v);
          rec[c.key]=v;
        });
        return rec;
      }).filter(r=>r.bunkName||r.traineeName);
      resolve(imported);
    }catch(err){reject(err);}
  };
  reader.onerror=()=>reject(new Error("Read error"));
  if(ext==="csv")reader.readAsText(file);
  else reader.readAsBinaryString(file);
});

// ── Bunk Name Dropdown with Search ────────────────────────────
function BunkNameDropdown({value,onChange}){
  const [open,setOpen]=useState(false);
  const [search,setSearch]=useState("");
  const wrapRef=useRef();
  const searchRef=useRef();

  useEffect(()=>{
    if(open&&searchRef.current)searchRef.current.focus();
  },[open]);

  useEffect(()=>{
    const handler=(e)=>{
      if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const filtered=useMemo(()=>{
    if(!search)return BUNK_NAMES;
    const q=search.toLowerCase();
    return BUNK_NAMES.filter(b=>b.toLowerCase().includes(q));
  },[search]);

  const select=(name)=>{
    onChange(name);
    setOpen(false);
    setSearch("");
  };

  return(
    <div className="bunk-dropdown-wrap" ref={wrapRef}>
      <div onClick={()=>setOpen(o=>!o)} style={{
        padding:"6px 8px",borderRadius:6,border:`1.5px solid ${open?"#6366f1":"#c7d2fe"}`,
        fontSize:12,background:"#fff",cursor:"pointer",display:"flex",justifyContent:"space-between",
        alignItems:"center",userSelect:"none",minHeight:32,color:value?"#1d4ed8":"#9ca3af",fontWeight:value?700:400
      }}>
        <span>{value||"SELECT BUNK NAME..."}</span>
        <span style={{fontSize:10,color:"#6366f1",marginLeft:6}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div className="bunk-dropdown-list">
          <input
            ref={searchRef}
            className="bunk-search-input"
            placeholder="🔍 SEARCH BUNK..."
            value={search}
            onChange={e=>setSearch(e.target.value.toUpperCase())}
            onClick={e=>e.stopPropagation()}
          />
          {filtered.length===0&&(
            <div style={{padding:"10px 12px",color:"#9ca3af",fontSize:12,textAlign:"center"}}>NO MATCH</div>
          )}
          {filtered.map(b=>(
            <div key={b} className={`bunk-opt${value===b?" selected":""}`} onClick={()=>select(b)}>{b}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Inline Bunk Name Dropdown for table ───────────────────────
function InlineBunkDropdown({value,onSave}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value||"");
  const [search,setSearch]=useState("");
  const wrapRef=useRef();
  const searchRef=useRef();

  useEffect(()=>{if(editing&&searchRef.current)searchRef.current.focus();},[editing]);
  useEffect(()=>{
    const handler=(e)=>{if(wrapRef.current&&!wrapRef.current.contains(e.target)){setEditing(false);setSearch("");}};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  const filtered=useMemo(()=>{
    if(!search)return BUNK_NAMES;
    const q=search.toLowerCase();
    return BUNK_NAMES.filter(b=>b.toLowerCase().includes(q));
  },[search]);

  const select=(name)=>{setVal(name);onSave("bunkName",name);setEditing(false);setSearch("");};

  if(!editing){
    return(
      <span onClick={()=>{setVal(value||"");setEditing(true);setSearch("");}} title="Click to change bunk"
        style={{cursor:"pointer",display:"block",minWidth:40,paddingBottom:1,borderBottom:"1px dashed transparent",transition:"border-color .15s"}}
        onMouseEnter={e=>e.currentTarget.style.borderBottomColor="#a5b4fc"}
        onMouseLeave={e=>e.currentTarget.style.borderBottomColor="transparent"}>
        {value||"—"}
      </span>
    );
  }

  return(
    <div ref={wrapRef} style={{position:"relative",minWidth:120}}>
      <input className="bunk-search-input" ref={searchRef} placeholder="🔍 SEARCH..."
        value={search} onChange={e=>setSearch(e.target.value.toUpperCase())}
        style={{width:"100%",padding:"3px 6px",border:"1.5px solid #6366f1",borderRadius:4,fontSize:11,outline:"none",background:"#fff"}}/>
      <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1.5px solid #6366f1",borderRadius:6,zIndex:9999,maxHeight:160,overflowY:"auto",boxShadow:"0 6px 18px rgba(99,102,241,0.2)"}}>
        {filtered.map(b=>(
          <div key={b} style={{padding:"5px 9px",cursor:"pointer",fontSize:11,borderBottom:"1px solid #e0e7ff",background:val===b?"#eef2ff":"#fff",color:val===b?"#3730a3":"#374151",fontWeight:val===b?700:400}}
            onClick={()=>select(b)} onMouseEnter={e=>e.currentTarget.style.background="#f0f0ff"} onMouseLeave={e=>e.currentTarget.style.background=val===b?"#eef2ff":"#fff"}>{b}</div>
        ))}
        {filtered.length===0&&<div style={{padding:"6px 9px",color:"#9ca3af",fontSize:11}}>NO MATCH</div>}
      </div>
    </div>
  );
}

// ── Inline Cell Editor ─────────────────────────────────────────
function InlineCell({rec,col,onSave}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(rec[col.key]||"");
  const inRef=useRef();

  // Bunk Name uses its own dropdown component
  if(col.key==="bunkName"){
    return <InlineBunkDropdown value={rec.bunkName} onSave={onSave}/>;
  }

  useEffect(()=>{if(editing&&inRef.current)inRef.current.focus();},[editing]);
  const commit=()=>{
    onSave(col.key,col.type==="number"||col.type==="date"?val:val.toUpperCase());
    if(col.key==="policyCount"){
      const sc=Math.round((parseFloat(val)||0)*SERVICE_CHARGE_RATE);
      onSave("serviceCharge",String(sc));
    }
    setEditing(false);
  };
  if(editing){
    return <input ref={inRef} className="inline-input"
      type={col.type==="number"?"number":col.type==="date"?"date":"text"}
      value={val} onChange={e=>setVal(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setEditing(false);setVal(rec[col.key]||"");}}}/>;
  }
  const fmtDate=v=>{if(!v)return"—";const d=v.split("T")[0];const p=d.split("-");return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:d;};
  const disp=col.type==="number"&&rec[col.key]&&!isNaN(parseFloat(rec[col.key]))?`₹${parseFloat(rec[col.key]).toLocaleString()}`:col.type==="date"?fmtDate(rec[col.key]):(rec[col.key]||"—");
  return <span onClick={()=>{setVal(rec[col.key]||"");setEditing(true);}} title="Click to edit"
    style={{cursor:"text",display:"block",minWidth:40,paddingBottom:1,borderBottom:"1px dashed transparent",transition:"border-color .15s",
      color:col.key==="remark"&&rec[col.key]?"#7c3aed":"inherit",fontStyle:col.key==="remark"&&rec[col.key]?"italic":"normal"}}
    onMouseEnter={e=>e.currentTarget.style.borderBottomColor="#a5b4fc"}
    onMouseLeave={e=>e.currentTarget.style.borderBottomColor="transparent"}>{disp}</span>;
}

// ── Per-Bunk Summary ──────────────────────────────────────────
function BunkSummary({records}){
  const [open,setOpen]=useState(false);
  const [openBunks,setOpenBunks]=useState(new Set());
  const bunkMap=useMemo(()=>{
    const m=new Map();
    records.forEach(r=>{
      const b=r.bunkName||"(NO BUNK)";
      if(!m.has(b))m.set(b,{records:[],totals:{}});
      m.get(b).records.push(r);
    });
    m.forEach(v=>{NUM_COLS.forEach(k=>{v.totals[k]=v.records.reduce((s,r)=>s+(parseFloat(r[k])||0),0);});});
    return m;
  },[records]);
  if(!records.length)return null;
  const toggleBunk=b=>setOpenBunks(s=>{const n=new Set(s);n.has(b)?n.delete(b):n.add(b);return n;});
  const TH2={padding:"6px 10px",textAlign:"left",color:"#4338ca",fontWeight:700,borderBottom:"1.5px solid #c7d2fe",fontSize:11,whiteSpace:"nowrap"};
  const TD2={padding:"5px 10px",fontSize:11};
  return(
    <div style={{background:"#fff",border:"2px solid #818cf8",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"10px 16px",background:"#eef2ff",border:"none",borderBottom:open?"2px solid #c7d2fe":"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",fontWeight:800,fontSize:13,color:"#3730a3"}}>
        <span>🏦 PER-BUNK SUMMARY ({bunkMap.size} BUNK{bunkMap.size!==1?"S":""})</span>
        <span>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{padding:12,display:"flex",flexDirection:"column",gap:8}}>
          {[...bunkMap.entries()].map(([bunk,{records:br,totals:bt}])=>(
            <div key={bunk} style={{border:"1.5px solid #c7d2fe",borderRadius:10,overflow:"hidden"}}>
              <button onClick={()=>toggleBunk(bunk)} style={{width:"100%",padding:"8px 12px",background:"#f5f7ff",border:"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",fontWeight:700,fontSize:12,color:"#4338ca",flexWrap:"wrap",gap:6}}>
                <span>📂 {bunk} — {br.length} TRAINEE{br.length!==1?"S":""}</span>
                <div style={{display:"flex",gap:12,fontSize:11,color:"#6366f1",alignItems:"center",flexWrap:"wrap"}}>
                  <span>📋 POLICY: {(bt.policyCount||0).toLocaleString()}</span>
                  <span>💵 CASH: ₹{(bt.cash||0).toLocaleString()}</span>
                  <span>📱 GPAY: ₹{(bt.gPay||0).toLocaleString()}</span>
                  <span style={{color:(bt.pendingAmount||0)>0?"#f59e0b":"#10b981",fontWeight:700}}>⏳ PENDING: ₹{(bt.pendingAmount||0).toLocaleString()}</span>
                  <span style={{color:"#7c3aed",fontWeight:700}}>🏢 OFFICE PAID: ₹{(bt.officePaid||0).toLocaleString()}</span>
                  <span>{openBunks.has(bunk)?"▲":"▼"}</span>
                </div>
              </button>
              {openBunks.has(bunk)&&(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                    <thead>
                      <tr style={{background:"#eef2ff"}}>
                        <th style={TH2}>#</th>
                        <th style={TH2}>TRAINEE NAME</th>
                        {["policyCount","serviceCharge","cms","cash","gPay","pendingAmount","officePaid","remark"].map(k=>(
                          <th key={k} style={TH2}>{COLS.find(c=>c.key===k)?.label}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {br.map((r,i)=>(
                        <tr key={r.id} style={{background:i%2===0?"#fff":"#f8f9ff"}}>
                          <td style={{...TD2,fontWeight:700,color:"#6366f1"}}>{i+1}</td>
                          <td style={{...TD2,color:"#374151",fontWeight:600}}>{r.traineeName||"—"}</td>
                          {["policyCount","serviceCharge","cms","cash","gPay","pendingAmount","officePaid","remark"].map(k=>(
                            <td key={k} style={{...TD2,fontWeight:600,
                              color:(k==="pendingAmount"&&(parseFloat(r[k])||0)>0)?"#d97706":(k==="officePaid"?"#7c3aed":(k==="remark"?"#7c3aed":"#1d4ed8")),
                              background:(k==="pendingAmount"&&(parseFloat(r[k])||0)>0)?"#fef9c3":(k==="officePaid"?"#f5f3ff":"inherit"),
                              fontStyle:k==="remark"?"italic":"normal"}}>
                              {k==="remark"?(r[k]||"—"):(r[k]&&!isNaN(parseFloat(r[k]))?`₹${parseFloat(r[k]).toLocaleString()}`:(r[k]||"—"))}
                            </td>
                          ))}
                        </tr>
                      ))}
                      <tr style={{background:"#ede9fe",fontWeight:700,borderTop:"1.5px solid #818cf8"}}>
                        <td style={TD2} colSpan={2}>TOTAL</td>
                        {["policyCount","serviceCharge","cms","cash","gPay","pendingAmount","officePaid","remark"].map(k=>(
                          <td key={k} style={{...TD2,color:"#5b21b6"}}>
                            {k==="remark"?"":(`₹${(bt[k]||0).toLocaleString()}`)}
                          </td>
                        ))}
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── File Upload Modal ─────────────────────────────────────────
function FileUploadModal({onClose,onImport}){
  const [dragging,setDragging]=useState(false);
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [mode,setMode]=useState("replace");
  const fileRef=useRef();

  const processFile=async(f)=>{
    setFile(f);setError(null);setPreview(null);setLoading(true);
    try{const recs=await parseUploadedFile(f);setPreview(recs);}
    catch(e){setError(e.message);}
    setLoading(false);
  };

  const handleDrop=e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};
  const handleChange=e=>{const f=e.target.files[0];if(f)processFile(f);};
  const doImport=()=>{if(!preview?.length)return;onImport(preview,mode);onClose();};

  const OV={position:"fixed",inset:0,background:"rgba(30,27,75,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16};

        {loading&&<div style={{textAlign:"center",padding:"14px 0",color:"#6366f1",fontWeight:700,fontSize:13}}><span className="spin" style={{display:"inline-block",marginRight:6}}>⟳</span> PARSING FILE...</div>}
        {error&&<div style={{background:"#fee2e2",border:"1.5px solid #ef4444",borderRadius:8,padding:"10px 14px",marginTop:12,fontSize:12,color:"#dc2626",fontWeight:700}}>❌ {error}</div>}
        {preview&&!loading&&(

                {[["replace","🔄 REPLACE ALL"],["append","➕ APPEND"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setMode(v)} style={{padding:"4px 10px",borderRadius:6,border:`2px solid ${mode===v?"#6366f1":"#c7d2fe"}`,background:mode===v?"#6366f1":"#fff",color:mode===v?"#fff":"#6366f1",fontSize:10,cursor:"pointer",fontWeight:700}}>{l}</button>
                ))}

            </div>
            <div style={{overflowX:"auto",border:"1.5px solid #c7d2fe",borderRadius:8,maxHeight:180}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:400}}>
                <thead><tr style={{background:"#eef2ff",position:"sticky",top:0}}>{["#","BUNK NAME","TRAINEE NAME","POLICY","SERVICE CHARGE","REMARK"].map(h=>(<th key={h} style={{padding:"5px 8px",textAlign:"left",color:"#4338ca",fontWeight:700,borderBottom:"1.5px solid #c7d2fe",whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
                <tbody>
                  {preview.slice(0,8).map((r,i)=>(<tr key={r.id} style={{background:i%2===0?"#fff":"#f8f9ff"}}><td style={{padding:"4px 8px",color:"#6366f1",fontWeight:700}}>{i+1}</td><td style={{padding:"4px 8px"}}>{r.bunkName||"—"}</td><td style={{padding:"4px 8px"}}>{r.traineeName||"—"}</td><td style={{padding:"4px 8px"}}>{r.policyCount||"—"}</td><td style={{padding:"4px 8px"}}>{r.serviceCharge||"—"}</td><td style={{padding:"4px 8px",color:"#7c3aed",fontStyle:"italic"}}>{r.remark||"—"}</td></tr>))}
                  {preview.length>8&&<tr><td colSpan={6} style={{padding:"4px 8px",color:"#9ca3af",fontStyle:"italic",textAlign:"center"}}>... AND {preview.length-8} MORE RECORDS</td></tr>}

            </div>
            {mode==="replace"&&<div style={{background:"#fef3c7",border:"1.5px solid #f59e0b",borderRadius:6,padding:"6px 10px",marginTop:8,fontSize:11,color:"#92400e",fontWeight:700}}>⚠ REPLACE MODE: EXISTING RECORDS WILL BE OVERWRITTEN</div>}
            {mode==="append"&&<div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:6,padding:"6px 10px",marginTop:8,fontSize:11,color:"#15803d",fontWeight:700}}>➕ APPEND MODE: RECORDS WILL BE ADDED TO EXISTING DATA</div>}

          <button onClick={doImport} disabled={!preview||loading} style={{padding:"8px 16px",borderRadius:8,border:"none",background:preview&&!loading?"#6366f1":"#c7d2fe",color:"#fff",fontWeight:700,fontSize:12,cursor:preview&&!loading?"pointer":"not-allowed"}}>📂 IMPORT {preview?`${preview.length} RECORDS`:""}</button>
        </div>
      </div>
    </div>
  );
}

// ── Save Bunk Names Button (handles async) ────────────────────
function SaveBunkBtn({names,onSave,onClose}){
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState(null);
  const doSave=async()=>{
    setSaving(true);setErr(null);
    const cleaned=names.map((n,i)=>n.trim()||DEFAULT_BUNK_NAMES[i]);
    const ok=await saveBunkNamesToSheet(cleaned);
    if(ok){
      BUNK_NAMES.splice(0,BUNK_NAMES.length,...cleaned);
      onSave(cleaned);
      onClose();
    }else{
      setErr("SAVE FAILED - CHECK NETWORK");
      setSaving(false);
    }
  };
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
      {err&&<div style={{fontSize:11,color:"#dc2626",fontWeight:700}}>{err}</div>}
      <button onClick={doSave} disabled={saving} style={{padding:"8px 18px",borderRadius:8,border:"none",background:saving?"#a5b4fc":"#6366f1",color:"#fff",fontWeight:700,fontSize:12,cursor:saving?"not-allowed":"pointer"}}>
        {saving?<><span className="spin" style={{display:"inline-block",marginRight:4}}>⟳</span>SAVING...</>:"SAVE ALL NAMES"}
      </button>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App(){
  const stored=loadState();
  const [invs,setInvs]=useState(stored?.invs||[mkInv("CMS 1",uid())]);
  const [activeId,setActiveId]=useState(stored?.activeId||(stored?.invs?.[0]?.id||null));
  const [search,setSearch]=useState("");
  const [histSearch,setHistSearch]=useState("");
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY);
  const [showForm,setShowForm]=useState(false);
  const [delId,setDelId]=useState(null);
  const [toast,setToast]=useState(null);
  const [showClose,setShowClose]=useState(false);
  const [showNew,setShowNew]=useState(false);
  const [newName,setNewName]=useState("");
  const [view,setView]=useState("active");
  const [histId,setHistId]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [status,setStatus]=useState(null);
  const [sortKey,setSortKey]=useState(null);
  const [sortDir,setSortDir]=useState("asc");
  const [selected,setSelected]=useState(new Set());
  const [showBulkDel,setShowBulkDel]=useState(false);
  const [undoStack,setUndoStack]=useState(null);
  const [renameId,setRenameId]=useState(null);
  const [renameName,setRenameName]=useState("");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [showUpload,setShowUpload]=useState(false);
  const [showPendingBunks,setShowPendingBunks]=useState(false);
  const [showBunkSettings,setShowBunkSettings]=useState(false);
  const [bunkNamesVer,setBunkNamesVer]=useState(0);
  const [bunkLoading,setBunkLoading]=useState(false);

  const tRef=useRef();const undoRef=useRef();
  useEffect(()=>{saveState(invs,activeId);},[invs,activeId]);
  useEffect(()=>()=>{clearTimeout(tRef.current);clearTimeout(undoRef.current);},[]);

  // Load bunk names from Google Sheet on startup
  useEffect(()=>{
    setBunkLoading(true);
    loadBunkNamesFromSheet().then(names=>{
      if(names)setBunkNamesVer(v=>v+1);
      setBunkLoading(false);
    });
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2800);};

  const isHist=view==="history";
  const active=invs.find(i=>i.id===activeId)||invs.find(i=>!i.closedAt)||null;
  const closed=invs.filter(i=>i.closedAt!==null);
  const histInv=invs.find(i=>i.id===histId);
  const currentInv=isHist?histInv:active;
  const records=active?.records||[];
  const currentSearch=isHist?histSearch:search;
  const baseDisplay=isHist?(histInv?.records||[]):records;

  const searched=useMemo(()=>{
    if(!currentSearch)return baseDisplay;
    const q=currentSearch.toLowerCase();
    return baseDisplay.filter(r=>COLS.some(c=>String(r[c.key]||"").toLowerCase().includes(q)));
  },[baseDisplay,currentSearch]);

  const parseLocalDate=s=>{if(!s)return null;const p=s.split("T")[0].split("-");return p.length===3?new Date(+p[0],+p[1]-1,+p[2]):null;};
  const dateFiltered=useMemo(()=>{
    if(!dateFrom&&!dateTo)return searched;
    const dFrom=parseLocalDate(dateFrom),dTo=parseLocalDate(dateTo);
    return searched.filter(r=>{
      const rf=r.fromDate,rt=r.toDate;
      if(!rf&&!rt)return false;
      const recFrom=parseLocalDate(rf||rt),recTo=parseLocalDate(rt||rf);
      if(!recFrom||!recTo)return false;
      if(dFrom&&recTo<dFrom)return false;
      if(dTo&&recFrom>dTo)return false;
      return true;
    });
  },[searched,dateFrom,dateTo]);

  const display=useMemo(()=>{
    if(!sortKey)return dateFiltered;
    return [...dateFiltered].sort((a,b)=>{
      let av=a[sortKey]||"",bv=b[sortKey]||"";
      const col=COLS.find(c=>c.key===sortKey);
      if(col?.type==="number"){av=parseFloat(av)||0;bv=parseFloat(bv)||0;}
      if(col?.type==="date"){av=av?parseLocalDate(av)||new Date(0):new Date(0);bv=bv?parseLocalDate(bv)||new Date(0):new Date(0);}
      if(av<bv)return sortDir==="asc"?-1:1;
      if(av>bv)return sortDir==="asc"?1:-1;
      return 0;
    });
  },[dateFiltered,sortKey,sortDir]);

  const totals=useMemo(()=>{const t={};NUM_COLS.forEach(k=>{t[k]=display.reduce((s,r)=>s+(parseFloat(r[k])||0),0);});return t;},[display]);

  const upd=(fn)=>setInvs(p=>p.map(i=>i.id===activeId?{...i,records:fn(i.records)}:i));
  const toggleSort=(key)=>{if(sortKey===key){setSortDir(d=>d==="asc"?"desc":"asc");}else{setSortKey(key);setSortDir("asc");}};

  // ── DUPLICATE CHECK REMOVED — trainee names can repeat ────
  // No checkDup function, no duplicate warning

  const handleFormChange=(key,value)=>{
    setForm(f=>{
      const next={...f,[key]:value};
      if(key==="policyCount"){
        const pc=parseFloat(value)||0;
        next.serviceCharge=pc>0?String(Math.round(pc*SERVICE_CHARGE_RATE)):"";
      }
      return next;
    });
  };

  const inlineSave=(recId,key,value)=>{
    setInvs(p=>p.map(i=>{
      if(i.id!==activeId)return i;
      return {...i,records:i.records.map(r=>{
        if(r.id!==recId)return r;
        const updr={...r,[key]:value};
        if(key==="policyCount"){const pc=parseFloat(value)||0;updr.serviceCharge=pc>0?String(Math.round(pc*SERVICE_CHARGE_RATE)):"";}
        return updr;
      })};
    }));
  };

  const save=()=>{
    if(!form.bunkName||!form.traineeName){showToast("Bunk Name & Trainee Name required","error");return;}
    // Allow duplicate trainee names — no check here
    if(editId!==null){upd(r=>r.map(x=>x.id===editId?{...form,id:editId}:x));showToast("Updated!");}
    else{upd(r=>[...r,{...form,id:uid()}]);showToast("Added!");}
    setShowForm(false);setEditId(null);setForm(EMPTY());
  };

  const saveSync=async()=>{
    if(!form.bunkName||!form.traineeName){showToast("Bunk Name & Trainee Name required","error");return;}
    // Allow duplicate trainee names — no check here
    const rec={...form,id:editId!==null?editId:uid()};
    const committedRecords=editId!==null
      ?(active?.records||[]).map(x=>x.id===editId?rec:x)
      :[...(active?.records||[]),rec];
    if(editId!==null){upd(r=>r.map(x=>x.id===editId?rec:x));}else{upd(r=>[...r,rec]);}
    setShowForm(false);setEditId(null);setForm(EMPTY());
    try{
      const sheetName=active?.name||"Sheet1";
      const header=COLS.map(c=>c.label.toUpperCase());
      if(editId!==null){
        const json=await scriptCall({action:"push",sheetName,rows:[header,...committedRecords.map(r=>COLS.map(c=>String(r[c.key]||"")))]});
        if(json.ok){showToast("Updated + Synced ✓");}else{showToast("Updated (sync error)","error");}
      } else {
        const json=await scriptCall({action:"append",sheetName,header,rows:[COLS.map(c=>String(rec[c.key]||""))]});
        if(json.ok){showToast("Added + Synced ✓");}else{showToast("Added (sync error)","error");}
      }
    }catch(e){showToast("Saved (sync failed: "+e.message+")","error");}
  };

  const push=async()=>{
    if(!display.length){setStatus({msg:"No records to push",ok:false});return;}
    if(!currentInv){setStatus({msg:"No active CMS",ok:false});return;}
    setSyncing(true);setStatus(null);
    try{
      const header=COLS.map(c=>c.label.toUpperCase());
      const rows=display.map(r=>COLS.map(c=>String(r[c.key]||"")));
      const json=await scriptCall({action:"push",sheetName:currentInv.name,rows:[header,...rows]});
      if(json.ok){setStatus({msg:`✓ ${display.length} records pushed to "${currentInv.name}"!`,ok:true});showToast("Pushed to Sheets!");}
      else setStatus({msg:"Error: "+(json.error||"Unknown"),ok:false});
    }catch(e){setStatus({msg:"Push failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  const pushAll=async()=>{
    setSyncing(true);setStatus(null);
    let count=0,failed=0;
    for(const inv of invs){
      if(!inv.records.length)continue;
      try{
        const header=COLS.map(c=>c.label.toUpperCase());
        await scriptCall({action:"push",sheetName:inv.name,rows:[header,...inv.records.map(r=>COLS.map(c=>String(r[c.key]||"")))]});
        count++;
      }catch(e){failed++;}
    }
    if(failed===0){setStatus({msg:`✓ All ${count} CMS pushed!`,ok:true});showToast("All CMS pushed!");}
    else{setStatus({msg:`Pushed ${count}, failed ${failed}`,ok:false});showToast(`${failed} CMS failed to push`,"error");}
    setSyncing(false);
  };

  const pull=async()=>{
    if(!currentInv){setStatus({msg:"No active CMS",ok:false});return;}
    setSyncing(true);setStatus(null);
    try{
      const json=await scriptCall({action:"get",sheetName:currentInv.name});
      if(!json.ok)throw new Error(json.error||"Unknown");
      const rows=json.rows||[];
      if(rows.length<2){setStatus({msg:`No data in "${currentInv.name}"`,ok:false});setSyncing(false);return;}
      const header=rows[0].map(h=>String(h).toLowerCase().replace(/\s+/g,""));
      const colMap=COLS.map(c=>header.findIndex(h=>h===c.key.toLowerCase()||h===c.label.toLowerCase().replace(/\s+/g,"")));
      const imported=rows.slice(1).map(row=>{const rec={id:uid()};COLS.forEach((c,ci)=>{let v=colMap[ci]>=0?String(row[colMap[ci]]||""):"";if(c.type==="date"&&v){v=normalizeDate(v);}rec[c.key]=v;});return rec;}).filter(r=>r.bunkName||r.traineeName);
      setInvs(p=>p.map(i=>i.id===currentInv.id?{...i,records:imported}:i));
      setStatus({msg:`✓ ${imported.length} records pulled!`,ok:true});showToast("Pulled!");
    }catch(e){setStatus({msg:"Pull failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  const pullAll=async()=>{
    setSyncing(true);setStatus(null);
    try{
      const json=await scriptCall({action:"getAll"});
      if(!json.ok)throw new Error(json.error||"Unknown");
      const sheetsData=json.sheets||{};
      let total=0;
      setInvs(prev=>{
        let updated=[...prev];
        for(const [sheetName,rows] of Object.entries(sheetsData)){
          if(!rows||rows.length<2)continue;
          const header=rows[0].map(h=>String(h).toLowerCase().replace(/\s+/g,""));
          const colMap=COLS.map(c=>header.findIndex(h=>h===c.key.toLowerCase()||h===c.label.toLowerCase().replace(/\s+/g,"")));
          const imported=rows.slice(1).map(row=>{const rec={id:uid()};COLS.forEach((c,ci)=>{let v=colMap[ci]>=0?String(row[colMap[ci]]||""):"";if(c.type==="date"&&v){v=normalizeDate(v);}rec[c.key]=v;});return rec;}).filter(r=>r.bunkName||r.traineeName);
          total+=imported.length;
          const ex=updated.find(i=>i.name.toUpperCase()===sheetName.toUpperCase());
          if(ex){updated=updated.map(i=>i.name.toUpperCase()===sheetName.toUpperCase()?{...i,records:imported}:i);}
          else{updated=[...updated,{id:uid(),name:sheetName,records:imported,closedAt:null,createdAt:new Date().toLocaleString()}];}
        }
        return updated;
      });
      setStatus({msg:`✓ Pulled all: ${total} records!`,ok:true});showToast("All pulled!");
    }catch(e){setStatus({msg:"Pull all failed: "+e.message,ok:false});}
    setSyncing(false);
  };

  const handleFileImport=(importedRecs,mode)=>{
    if(mode==="replace"){upd(()=>importedRecs);showToast(`📂 Imported ${importedRecs.length} records (replaced)`);}
    else{upd(existing=>[...existing,...importedRecs]);showToast(`📂 Appended ${importedRecs.length} records`);}
  };

  const closeInv=()=>{
    const closedAt=new Date().toLocaleString();
    const remaining=invs.filter(i=>i.id!==activeId&&!i.closedAt);
    setInvs(p=>p.map(i=>i.id===activeId?{...i,closedAt}:i));
    if(remaining.length){setActiveId(remaining[0].id);setView("active");}
    else{setHistId(activeId);setView("history");}
    setShowClose(false);showToast("CMS Closed!");setSelected(new Set());
  };

  const newInv=async()=>{
    const n=(newName.trim()||`CMS ${invs.length+1}`).toUpperCase();
    if(invs.some(i=>i.name.toUpperCase()===n)){showToast(`"${n}" already exists!`,"error");return;}
    const id=uid();
    setInvs(p=>[...p,mkInv(n,id)]);
    setActiveId(id);setNewName("");setShowNew(false);setView("active");
    setSearch("");setStatus(null);setSelected(new Set());setSortKey(null);setDateFrom("");setDateTo("");
    showToast(`"${n}" Started!`);
    try{await scriptCall({action:"push",sheetName:n,rows:[COLS.map(c=>c.label.toUpperCase())]});}catch(e){}
  };

  const doRename=()=>{
    const n=renameName.trim().toUpperCase();
    if(!n){showToast("Name cannot be empty","error");return;}
    if(invs.some(i=>i.id!==renameId&&i.name.toUpperCase()===n)){showToast(`"${n}" already exists!`,"error");return;}
    setInvs(p=>p.map(i=>i.id===renameId?{...i,name:n}:i));
    setRenameId(null);setRenameName("");showToast("Renamed!");
  };

  const deleteRecord=(id)=>{
    const rec=records.find(r=>r.id===id);
    setUndoStack({records:[rec],invId:activeId});
    upd(r=>r.filter(x=>x.id!==id));setDelId(null);
    showToast("Deleted! (UNDO available)","error");
    clearTimeout(undoRef.current);undoRef.current=setTimeout(()=>setUndoStack(null),8000);
  };

  const doBulkDelete=()=>{
    const toDelete=[...selected];
    setUndoStack({records:records.filter(r=>toDelete.includes(r.id)),invId:activeId});
    upd(r=>r.filter(x=>!toDelete.includes(x.id)));
    setSelected(new Set());setShowBulkDel(false);
    showToast(`${toDelete.length} deleted! (UNDO available)`,"error");
    clearTimeout(undoRef.current);undoRef.current=setTimeout(()=>setUndoStack(null),8000);
  };

  const doUndo=()=>{
    if(!undoStack)return;
    setInvs(p=>p.map(i=>{
      if(i.id!==undoStack.invId)return i;
      const existingIds=new Set(i.records.map(r=>r.id));
      const toRestore=undoStack.records.filter(r=>!existingIds.has(r.id));
      return{...i,records:[...i.records,...toRestore]};
    }));
    setUndoStack(null);clearTimeout(undoRef.current);showToast("Restored!");
  };

  const toggleSelect=(id)=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const displayIds=useMemo(()=>new Set(display.map(r=>r.id)),[display]);
  const allDisplaySelected=display.length>0&&display.every(r=>selected.has(r.id));
  const selectAll=()=>setSelected(()=>allDisplaySelected?new Set():new Set(display.map(r=>r.id)));

  const download=(recs,name,fmt="xls")=>{
    if(!recs?.length){showToast("No records","error");return;}
    if(fmt==="csv"){const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(toCSV(recs));a.download=`${name||"cms"}.csv`;a.click();showToast("CSV Downloaded!");return;}
    const esc=v=>String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const hRow=COLS.map(c=>`<Cell ss:StyleID="h"><Data ss:Type="String">${esc(c.label.toUpperCase())}</Data></Cell>`).join("");
    const dRows=recs.map(r=>"<Row>"+COLS.map(c=>{const v=r[c.key]||"";const t=c.type==="number"&&v?"Number":"String";return`<Cell><Data ss:Type="${t}">${esc(t==="Number"?parseFloat(v)||0:v)}</Data></Cell>`;}).join("")+"</Row>").join("");
    const xml=`<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"><Styles><Style ss:ID="h"><Font ss:Bold="1"/><Interior ss:Color="#C7D2FE" ss:Pattern="Solid"/></Style></Styles><Worksheet ss:Name="CMS"><Table><Row>${hRow}</Row>${dRows}</Table></Worksheet></Workbook>`;
    const a=document.createElement("a");a.href="data:application/vnd.ms-excel;charset=utf-8,"+encodeURIComponent(xml);a.download=`${name||"cms"}.xls`;a.click();showToast("Downloaded!");
  };

  const duplicateRecord=(rec)=>{
    upd(r=>[...r,{...rec,id:uid()}]);
    showToast("Duplicated!");
  };

  const stats=useMemo(()=>{
    const n=display.length;if(!n)return null;
    const pending=display.filter(x=>(parseFloat(x.pendingAmount)||0)>0).length;
    const withRemark=display.filter(x=>x.remark&&x.remark.trim()).length;
    return{pending,withRemark};
  },[display]);

  const pendingBunks=useMemo(()=>{
    const usedBunks=new Set(records.map(r=>(r.bunkName||"").trim().toUpperCase()).filter(Boolean));
    return BUNK_NAMES.filter(b=>!usedBunks.has(b.toUpperCase()));
  },[records]);

  const isDateFiltered=!!(dateFrom||dateTo);
  const btn=(bg,color,outline)=>({padding:"8px 14px",borderRadius:8,border:`2px solid ${outline?"#6b7280":bg}`,background:outline?"transparent":bg,color:outline?"#6b7280":color,fontWeight:700,fontSize:12,cursor:"pointer"});
  const TH={padding:"9px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:"#4338ca",whiteSpace:"nowrap",borderBottom:"2px solid #a5b4fc",borderRight:"1px solid #c7d2fe",background:"#eef2ff",cursor:"pointer",userSelect:"none"};
  const TD={padding:"8px 10px",fontSize:12,whiteSpace:"nowrap",borderBottom:"1px solid #e0e7ff",borderRight:"1px solid #e0e7ff"};
  const OV={position:"fixed",inset:0,background:"rgba(30,27,75,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16};
  const sortArrow=k=>sortKey!==k?" ⇅":sortDir==="asc"?" ↑":" ↓";

  return(
    <div style={{minHeight:"100vh"}}>
      {toast&&<div className="fade-in" style={{position:"fixed",top:16,right:16,zIndex:9999,background:toast.type==="error"?"#ef4444":"#22c55e",color:"#fff",padding:"10px 18px",borderRadius:8,border:"2px solid rgba(255,255,255,0.4)",fontWeight:700,fontSize:13}}>{toast.msg}</div>}

      {undoStack&&<div className="fade-in" style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:"#1e1b4b",color:"#fff",padding:"10px 20px",borderRadius:10,border:"2px solid #6366f1",fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:12}}>
        <span>🗑 {undoStack.records.length} record{undoStack.records.length>1?"s":""} deleted</span>
        <button onClick={doUndo} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontWeight:700,fontSize:12}}>↩ UNDO</button>
        <button onClick={()=>setUndoStack(null)} style={{background:"none",color:"#a5b4fc",border:"none",cursor:"pointer",fontSize:16}}>✕</button>
      </div>}

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#3b82f6,#6366f1)",borderRadius:14,border:"2px solid #818cf8",padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{color:"#fff",fontSize:18,fontWeight:800}}>📋 TRAINEE CMS</div>
            <div style={{color:"#bfdbfe",fontSize:11,marginTop:2}}>
              {isHist?`VIEWING: ${histInv?.name}`:`ACTIVE: ${active?.name}`} • {(isHist?histInv?.records?.length:records.length)||0} RECORDS
              {currentInv?.createdAt&&<span style={{marginLeft:8,opacity:.7}}>| CREATED: {currentInv.createdAt}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {!isHist&&<button onClick={()=>{setForm(EMPTY());setEditId(null);setShowForm(true);}} style={btn("#3b82f6","#fff")}>+ ADD</button>}
            {!isHist&&<button onClick={()=>setShowUpload(true)} style={btn("#0ea5e9","#fff")}>📂 IMPORT</button>}
            {selected.size>0&&!isHist&&<button onClick={()=>setShowBulkDel(true)} style={btn("#ef4444","#fff")}>🗑 DEL ({selected.size})</button>}
            <div style={{display:"inline-flex"}}>
              <button onClick={()=>download(display,currentInv?.name,"xls")} style={{...btn("#10b981","#fff"),borderTopRightRadius:0,borderBottomRightRadius:0,borderRight:"1px solid rgba(255,255,255,0.3)"}}>⬇ XLS</button>
              <button onClick={()=>download(display,currentInv?.name,"csv")} style={{...btn("#10b981","#fff"),borderTopLeftRadius:0,borderBottomLeftRadius:0,padding:"8px 10px"}}>CSV</button>
            </div>
            {!isHist&&<button onClick={()=>setShowClose(true)} style={btn("#f59e0b","#fff")}>🔒 CLOSE</button>}
            <button onClick={()=>setShowNew(true)} style={btn("#8b5cf6","#fff")}>✨ NEW CMS</button>
            <button onClick={()=>setShowBunkSettings(true)} style={btn("#0f172a","#fff")} title="Customize Bunk Names">{bunkLoading?<span className="spin">⟳</span>:"⚙"} BUNKS</button>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap",alignItems:"center"}}>
          {invs.filter(i=>!i.closedAt).map(i=>(
            <div key={i.id} style={{display:"flex",alignItems:"center",gap:2}}>
              <button onClick={()=>{setActiveId(i.id);setView("active");setSearch("");setStatus(null);setSelected(new Set());setSortKey(null);setDateFrom("");setDateTo("");}}
                style={{padding:"4px 12px",borderRadius:20,border:"2px solid #fff",fontSize:11,fontWeight:700,cursor:"pointer",background:view==="active"&&activeId===i.id?"#fff":"transparent",color:view==="active"&&activeId===i.id?"#3b82f6":"#fff"}}>📂 {i.name}</button>
              <button onClick={()=>{setRenameId(i.id);setRenameName(i.name);}} title="Rename" style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,color:"#fff",fontSize:10,cursor:"pointer",padding:"2px 5px"}}>✎</button>
            </div>
          ))}
          {closed.map(i=>(
            <button key={i.id} onClick={()=>{setView("history");setHistId(i.id);setStatus(null);setHistSearch("");setSelected(new Set());setSortKey(null);setDateFrom("");setDateTo("");}}
              style={{padding:"4px 12px",borderRadius:20,border:"2px solid #fbbf24",fontSize:11,fontWeight:700,cursor:"pointer",background:view==="history"&&histId===i.id?"#fbbf24":"transparent",color:view==="history"&&histId===i.id?"#1e293b":"#fde68a"}}>🔒 {i.name}</button>
          ))}
        </div>
      </div>

      {isHist&&histInv&&<div style={{background:"#fef3c7",border:"2px solid #f59e0b",borderRadius:10,padding:"9px 14px",marginBottom:12,fontSize:12,color:"#92400e",fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>🔒 CLOSED: {histInv.name} | {histInv.closedAt}</span>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>download(histInv.records,histInv.name,"xls")} style={{...btn("#f59e0b","#fff"),fontSize:10,padding:"4px 8px"}}>⬇ XLS</button>
          <button onClick={()=>download(histInv.records,histInv.name,"csv")} style={{...btn("#f59e0b","#fff"),fontSize:10,padding:"4px 8px"}}>⬇ CSV</button>
        </div>
      </div>}

      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"stretch"}}>
        <div style={{flex:"2 1 200px",border:"2px solid #a5b4fc",borderRadius:10,background:"#fff",display:"flex",alignItems:"center",overflow:"hidden"}}>
          <input placeholder="🔍 SEARCH..." value={isHist?histSearch:search}
            onChange={e=>isHist?setHistSearch(e.target.value.toUpperCase()):setSearch(e.target.value.toUpperCase())}
            style={{flex:1,padding:"10px 14px",border:"none",fontSize:13,outline:"none",background:"transparent"}}/>
          {(isHist?histSearch:search)&&<button onClick={()=>isHist?setHistSearch(""):setSearch("")} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",padding:"0 12px",fontSize:16}}>✕</button>}
          {!isHist&&<div style={{padding:"0 12px",fontSize:11,color:"#6366f1",fontWeight:700,whiteSpace:"nowrap"}}>{display.length}/{records.length}</div>}
        </div>
        <div style={{flex:"3 1 280px",border:`2px solid ${isDateFiltered?"#3b82f6":"#a5b4fc"}`,borderRadius:10,background:"#fff",display:"flex",alignItems:"center",gap:6,padding:"0 10px"}}>
          <span style={{fontSize:11,fontWeight:700,color:"#4338ca",whiteSpace:"nowrap"}}>📅 FROM</span>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{flex:1,padding:"8px 4px",border:"none",fontSize:12,outline:"none",background:"transparent",minWidth:90}}/>
          <span style={{fontSize:11,fontWeight:700,color:"#4338ca",whiteSpace:"nowrap"}}>TO</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{flex:1,padding:"8px 4px",border:"none",fontSize:12,outline:"none",background:"transparent",minWidth:90}}/>
          {isDateFiltered&&<button onClick={()=>{setDateFrom("");setDateTo("");}} style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>✕ CLEAR</button>}
        </div>
      </div>

      {isDateFiltered&&<div style={{background:"#dbeafe",border:"2px solid #3b82f6",borderRadius:8,padding:"5px 12px",marginBottom:10,fontSize:11,fontWeight:700,color:"#1d4ed8",display:"inline-block"}}>
        📅 FILTERED: {dateFrom||"..."} → {dateTo||"..."} | {display.length} RECORD{display.length!==1?"S":""}
      </div>}

      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
        {[
          {label:"TOTAL G PAY",key:"gPay",color:"#6366f1",bg:"#ede9fe"},
          {label:"TOTAL CASH",key:"cash",color:"#10b981",bg:"#d1fae5"},
          {label:"TOTAL PENDING",key:"pendingAmount",color:"#f59e0b",bg:"#fef3c7"},
          {label:"G PAY + CASH",key:"_sum",color:"#0ea5e9",bg:"#e0f2fe"},
          {label:"POLICY COUNT",key:"policyCount",color:"#059669",bg:"#d1fae5",noRupee:true},
          {label:"CMS AMOUNT",key:"cms",color:"#7c3aed",bg:"#f5f3ff"},
          {label:"GPA AMOUNT",key:"gpaAmount",color:"#f43f5e",bg:"#ffe4e6"},
          {label:"OFFICE PAID",key:"officePaid",color:"#7c3aed",bg:"#f5f3ff"},
        ].map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:10,padding:"10px 16px",flex:"1 1 100px",border:`2px solid ${s.color}`}}>
            <div style={{fontSize:10,color:s.color,fontWeight:700}}>{s.label}</div>
            <div style={{fontSize:18,fontWeight:800,color:s.color}}>
              {s.key==="_sum"?`₹${((totals.gPay||0)+(totals.cash||0)).toLocaleString()}`:s.noRupee?(totals[s.key]||0).toLocaleString():`₹${(totals[s.key]||0).toLocaleString()}`}
            </div>
          </div>
        ))}
        <div style={{background:"#f0fdf4",borderRadius:10,padding:"10px 14px",flex:"1 1 200px",border:"2px solid #22c55e"}}>
          <div style={{fontSize:10,color:"#15803d",fontWeight:700,marginBottom:4}}>🟢 GOOGLE SHEETS — <span style={{color:"#0ea5e9"}}>{currentInv?.name||"—"}</span></div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[["↑ PUSH",push,"#10b981"],["↓ PULL",pull,"#3b82f6"],["↑↑ ALL",pushAll,"#8b5cf6"],["↓↓ ALL",pullAll,"#f59e0b"]].map(([label,fn,color])=>(
              <button key={label} onClick={fn} disabled={syncing} style={{...btn(color,"#fff"),fontSize:10,padding:"5px 8px",flex:"1 1 50px"}}>{syncing?<span className="spin">⟳</span>:label}</button>
            ))}
          </div>
        </div>
      </div>

      {stats&&display.length>0&&<div style={{background:"#fff",border:"2px solid #c7d2fe",borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:"#4338ca",fontWeight:700,alignItems:"center"}}>
        <span>📊 {display.length} RECORDS</span><span>|</span>
        <span style={{color:stats.pending>0?"#f59e0b":"#10b981"}}>⚠ {stats.pending} WITH PENDING</span>
        {stats.withRemark>0&&<><span>|</span><span style={{color:"#7c3aed"}}>💬 {stats.withRemark} WITH REMARK</span></>}
        {selected.size>0&&<><span>|</span><span style={{color:"#ef4444"}}>☑ {selected.size} SELECTED</span></>}
        {!isHist&&<><span>|</span>
        <span>🏦 {BUNK_NAMES.length-pendingBunks.length} BUNKS USED</span><span>|</span>
        <span onClick={()=>setShowPendingBunks(true)} style={{color:pendingBunks.length>0?"#ef4444":"#10b981",cursor:pendingBunks.length>0?"pointer":"default",textDecoration:pendingBunks.length>0?"underline":"none",display:"flex",alignItems:"center",gap:4}}>
          ⏳ {pendingBunks.length} BUNKS PENDING{pendingBunks.length>0?" 👆":""}
        </span></>}
      </div>}

      {status&&<div style={{marginBottom:12,padding:"9px 14px",borderRadius:10,fontSize:12,fontWeight:700,background:status.ok?"#dcfce7":"#fee2e2",border:`2px solid ${status.ok?"#22c55e":"#ef4444"}`,color:status.ok?"#15803d":"#dc2626"}}>{status.msg}</div>}

      <BunkSummary records={display}/>

      <div style={{background:"#fff",borderRadius:12,border:"2px solid #a5b4fc",overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:1400}}>
          <thead><tr>
            {!isHist&&<th style={{...TH,cursor:"default"}}><input type="checkbox" checked={allDisplaySelected} onChange={selectAll} style={{cursor:"pointer"}}/></th>}
            <th style={{...TH,cursor:"default"}}>S NO</th>
            {COLS.map(c=><th key={c.key} style={{...TH,background:c.key==="remark"?"#f5f3ff":TH.background}} onClick={()=>toggleSort(c.key)}>{c.label}{sortArrow(c.key)}</th>)}
            {!isHist&&<th style={{...TH,cursor:"default"}}>ACTIONS</th>}
          </tr></thead>
          <tbody>
            {display.length===0?(
              <tr><td colSpan={COLS.length+3} style={{textAlign:"center",padding:36,color:"#9ca3af"}}>
                {(currentSearch||isDateFiltered)?"NO MATCHING RECORDS. CLEAR FILTERS.":"NO RECORDS. ADD ONE!"}
              </td></tr>
            ):display.map((r,i)=>(
              <tr key={r.id} style={{background:selected.has(r.id)?"#ede9fe":i%2===0?"#fff":"#f5f7ff"}}>
                {!isHist&&<td style={{...TD,textAlign:"center"}}><input type="checkbox" checked={selected.has(r.id)} onChange={()=>toggleSelect(r.id)} style={{cursor:"pointer"}}/></td>}
                <td style={{...TD,fontWeight:700,color:"#6366f1"}}>{i+1}</td>
                {COLS.map(c=>(
                  <td key={c.key} style={{...TD,fontWeight:c.type==="number"?600:400,
                    color:c.key==="remark"?"#7c3aed":(c.type==="number"?"#1d4ed8":"#374151"),
                    background:c.key==="pendingAmount"&&(parseFloat(r[c.key])||0)>0?"#fef9c3":(c.key==="remark"&&r[c.key]?"#faf5ff":"inherit"),
                    fontStyle:c.key==="remark"?"italic":"normal",
                    padding:!isHist?"4px 8px":TD.padding}}>
                    {!isHist
                      ?<InlineCell rec={r} col={c} onSave={(key,val)=>inlineSave(r.id,key,val)}/>
                      :(c.type==="number"&&r[c.key]&&!isNaN(parseFloat(r[c.key]))?`₹${parseFloat(r[c.key]).toLocaleString()}`:c.type==="date"?(r[c.key]?(r[c.key].split("T")[0].split("-").reverse().join("-")):"—"):(r[c.key]||"—"))
                    }
                  </td>
                ))}
                {!isHist&&<td style={{...TD,whiteSpace:"nowrap"}}>
                  <button onClick={()=>{setForm({...r});setEditId(r.id);setShowForm(true);}} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #3b82f6",background:"#dbeafe",color:"#1d4ed8",cursor:"pointer",fontSize:11,fontWeight:700}}>✏</button>
                  <button onClick={()=>duplicateRecord(r)} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #8b5cf6",background:"#ede9fe",color:"#5b21b6",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4}}>⧉</button>
                  <button onClick={()=>setDelId(r.id)} style={{padding:"4px 8px",borderRadius:6,border:"1.5px solid #ef4444",background:"#fee2e2",color:"#dc2626",cursor:"pointer",fontSize:11,fontWeight:700,marginLeft:4}}>🗑</button>
                </td>}
              </tr>
            ))}
            {display.length>0&&<tr style={{background:"#ede9fe",fontWeight:700,borderTop:"2px solid #818cf8"}}>
              {!isHist&&<td style={TD}/>}
              <td style={TD} colSpan={3}>TOTAL ({display.length})</td>
              {COLS.slice(2).map(c=><td key={c.key} style={{...TD,color:"#5b21b6"}}>{c.type==="number"?`₹${(totals[c.key]||0).toLocaleString()}`:""}</td>)}
              {!isHist&&<td style={TD}/>}
            </tr>}
          </tbody>
        </table>
      </div>

      {/* ADD/EDIT MODAL */}
      {showForm&&<div style={OV}>
        <div style={{background:"#fff",borderRadius:14,border:"2px solid #6366f1",padding:20,width:"95%",maxWidth:680,maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,paddingBottom:12,borderBottom:"2px solid #e0e7ff"}}>
            <div style={{fontSize:16,fontWeight:800}}>{editId?"✏ EDIT RECORD":"➕ NEW RECORD"}</div>
            <button onClick={()=>{setShowForm(false);setEditId(null);setForm(EMPTY());}} style={{background:"none",border:"2px solid #e2e8f0",borderRadius:6,fontSize:16,cursor:"pointer",color:"#6b7280",width:32,height:32}}>✕</button>
          </div>

          <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:8,padding:"7px 12px",marginBottom:12,fontSize:11,color:"#15803d",fontWeight:700}}>
            💡 SERVICE CHARGE = POLICY COUNT × ₹{SERVICE_CHARGE_RATE} (AUTO-FILLED) &nbsp;|&nbsp; ✅ DUPLICATE TRAINEE NAMES ALLOWED
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {COLS.map(c=>(
              <div key={c.key} style={{display:"flex",flexDirection:"column",gap:3,
                border:`1.5px solid ${c.key==="serviceCharge"?"#86efac":c.key==="remark"?"#c4b5fd":c.key==="bunkName"?"#818cf8":"#e0e7ff"}`,
                borderRadius:8,padding:"8px 10px",
                background:c.key==="serviceCharge"?"#f0fdf4":c.key==="remark"?"#faf5ff":c.key==="bunkName"?"#eef2ff":"#f8faff",
                gridColumn:c.key==="remark"?"1 / -1":"auto",
                position:"relative",zIndex:c.key==="bunkName"?200:"auto"}}>
                <label style={{fontSize:10,fontWeight:700,color:c.key==="serviceCharge"?"#15803d":c.key==="remark"?"#7c3aed":c.key==="bunkName"?"#3730a3":"#6366f1"}}>
                  {c.label}
                  {["bunkName","traineeName"].includes(c.key)&&<span style={{color:"#ef4444"}}> *</span>}
                  {c.key==="serviceCharge"&&<span style={{color:"#15803d"}}> ✦ AUTO</span>}
                  {c.key==="remark"&&<span style={{color:"#7c3aed"}}> 💬</span>}
                  {c.key==="bunkName"&&<span style={{color:"#6366f1"}}> 🏦 ({BUNK_NAMES.length} OPTIONS)</span>}
                </label>

                {/* ── BUNK NAME uses searchable dropdown ── */}
                {c.key==="bunkName"?(
                  <BunkNameDropdown value={form.bunkName} onChange={v=>setForm(f=>({...f,bunkName:v}))}/>
                ):c.key==="remark"?(
                  <textarea value={form[c.key]} onChange={e=>setForm(f=>({...f,[c.key]:e.target.value.toUpperCase()}))}
                    placeholder="ENTER ANY REMARKS OR NOTES..."
                    style={{padding:"6px 8px",borderRadius:6,border:"1.5px solid #c4b5fd",fontSize:12,outline:"none",background:"#fff",resize:"vertical",minHeight:60,fontFamily:"Inter,sans-serif",textTransform:"uppercase"}}/>
                ):(
                  <input
                    type={c.type==="number"?"number":c.type==="date"?"date":"text"}
                    value={form[c.key]}
                    readOnly={c.key==="serviceCharge"}
                    onChange={e=>handleFormChange(c.key,c.type==="number"||c.type==="date"?e.target.value:e.target.value.toUpperCase())}
                    style={{padding:"6px 8px",borderRadius:6,border:"1.5px solid #c7d2fe",fontSize:12,outline:"none",background:c.key==="serviceCharge"?"#dcfce7":"#fff",cursor:c.key==="serviceCharge"?"not-allowed":"text"}}
                    placeholder={c.key==="serviceCharge"?"AUTO FROM POLICY COUNT":c.label}
                  />
                )}
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:16,paddingTop:12,borderTop:"2px solid #e0e7ff"}}>
            <button onClick={()=>{setShowForm(false);setEditId(null);setForm(EMPTY());}} style={btn("transparent","#6b7280",true)}>CANCEL</button>
            <button onClick={saveSync} style={btn("#22c55e","#fff")}>💾 SAVE + SYNC ↑</button>
            <button onClick={save} style={btn("#3b82f6","#fff")}>💾 SAVE</button>
          </div>
        </div>
      </div>}

      {showUpload&&<FileUploadModal onClose={()=>setShowUpload(false)} onImport={handleFileImport}/>}

      {showBunkSettings&&<BunkSettingsModal onClose={()=>setShowBunkSettings(false)} onSave={(names)=>{setBunkNamesVer(v=>v+1);showToast("Bunk names saved!");}}/>}

      {/* PENDING BUNKS MODAL */}
      {showPendingBunks&&<div style={{position:"fixed",inset:0,background:"rgba(30,27,75,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
        <div style={{background:"#fff",borderRadius:16,border:"2px solid #ef4444",padding:24,width:"95%",maxWidth:520,maxHeight:"88vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,paddingBottom:12,borderBottom:"2px solid #fee2e2"}}>
            <div style={{fontSize:16,fontWeight:800,color:"#dc2626"}}>⏳ PENDING BUNKS ({pendingBunks.length})</div>
            <button onClick={()=>setShowPendingBunks(false)} style={{background:"none",border:"2px solid #e2e8f0",borderRadius:6,fontSize:16,cursor:"pointer",color:"#6b7280",width:32,height:32}}>✕</button>
          </div>
          <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#991b1b",fontWeight:700}}>
            💡 TAP ANY BUNK NAME TO OPEN ADD RECORD FORM WITH THAT BUNK PRE-FILLED
          </div>
          {pendingBunks.length===0?(
            <div style={{textAlign:"center",padding:28,color:"#10b981",fontWeight:800,fontSize:14}}>🎉 ALL {BUNK_NAMES.length} BUNKS ARE ADDED!</div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
              {pendingBunks.map(b=>(
                <button key={b} onClick={()=>{
                  setShowPendingBunks(false);
                  setForm({...EMPTY(),bunkName:b});
                  setEditId(null);
                  setShowForm(true);
                }} style={{padding:"10px 8px",borderRadius:9,border:"2px solid #fca5a5",background:"#fff5f5",color:"#dc2626",fontWeight:700,fontSize:12,cursor:"pointer",textAlign:"center",transition:"all .15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#fee2e2";e.currentTarget.style.borderColor="#ef4444";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#fff5f5";e.currentTarget.style.borderColor="#fca5a5";}}>
                  🏦 {b}
                </button>
              ))}
            </div>
          )}
          <div style={{marginTop:16,paddingTop:12,borderTop:"1.5px solid #fee2e2",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:11,color:"#9ca3af",fontWeight:700}}>
              ✅ {BUNK_NAMES.length - pendingBunks.length} / {BUNK_NAMES.length} BUNKS COMPLETED
            </div>
            <button onClick={()=>setShowPendingBunks(false)} style={{padding:"7px 16px",borderRadius:8,border:"2px solid #6b7280",background:"transparent",color:"#6b7280",fontWeight:700,fontSize:12,cursor:"pointer"}}>CLOSE</button>
          </div>
        </div>
      </div>}

      {showClose&&<div style={OV}><div style={{background:"#fff",borderRadius:14,border:"2px solid #f59e0b",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🔒</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>CLOSE THIS CMS?</div>
        <div style={{color:"#6b7280",fontSize:12,marginBottom:16,border:"1.5px solid #fde68a",borderRadius:8,padding:10,background:"#fffbeb"}}>THIS CMS WILL BE LOCKED & SAVED IN HISTORY.</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>setShowClose(false)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
          <button onClick={closeInv} style={btn("#f59e0b","#fff")}>🔒 CLOSE & SAVE</button>
        </div>
      </div></div>}

      {showNew&&<div style={OV}><div style={{background:"#fff",borderRadius:14,border:"2px solid #8b5cf6",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>✨</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:14}}>NEW CMS</div>
        <input value={newName} onChange={e=>setNewName(e.target.value.toUpperCase())} placeholder="NAME (E.G. MARCH 2026)"
          style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"2px solid #c4b5fd",fontSize:13,boxSizing:"border-box",outline:"none",marginBottom:16}}
          onKeyDown={e=>e.key==="Enter"&&newInv()}/>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>{setShowNew(false);setNewName("");}} style={btn("transparent","#6b7280",true)}>CANCEL</button>
          <button onClick={newInv} style={btn("#8b5cf6","#fff")}>✨ START FRESH</button>
        </div>
      </div></div>}

      {renameId&&<div style={OV}><div style={{background:"#fff",borderRadius:14,border:"2px solid #3b82f6",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>✎</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:14}}>RENAME CMS</div>
        <input value={renameName} onChange={e=>setRenameName(e.target.value.toUpperCase())} placeholder="NEW NAME"
          style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"2px solid #93c5fd",fontSize:13,boxSizing:"border-box",outline:"none",marginBottom:16}}
          onKeyDown={e=>e.key==="Enter"&&doRename()}/>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>setRenameId(null)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
          <button onClick={doRename} style={btn("#3b82f6","#fff")}>✎ RENAME</button>
        </div>
      </div></div>}

      {delId&&<div style={OV}><div style={{background:"#fff",borderRadius:14,border:"2px solid #ef4444",padding:24,maxWidth:320,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>DELETE RECORD?</div>
        <div style={{color:"#6b7280",marginBottom:16,fontSize:12,padding:8,border:"1.5px solid #fee2e2",borderRadius:8,background:"#fff5f5"}}>YOU CAN UNDO FOR 8 SECONDS.</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>setDelId(null)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
          <button onClick={()=>deleteRecord(delId)} style={btn("#ef4444","#fff")}>DELETE</button>
        </div>
      </div></div>}

      {showBulkDel&&<div style={OV}><div style={{background:"#fff",borderRadius:14,border:"2px solid #ef4444",padding:24,maxWidth:340,width:"90%",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🗑️</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>DELETE {selected.size} RECORDS?</div>
        <div style={{color:"#6b7280",marginBottom:16,fontSize:12,padding:8,border:"1.5px solid #fee2e2",borderRadius:8,background:"#fff5f5"}}>YOU CAN UNDO FOR 8 SECONDS.</div>
        <div style={{display:"flex",gap:8,justifyContent:"center"}}>
          <button onClick={()=>setShowBulkDel(false)} style={btn("transparent","#6b7280",true)}>CANCEL</button>
          <button onClick={doBulkDelete} style={btn("#ef4444","#fff")}>DELETE ALL</button>
        </div>
      </div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
